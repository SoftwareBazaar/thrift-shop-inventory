<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Favicon and App Icons -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" sizes="48x48 32x32 16x16" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" crossorigin="use-credentials" />
    
    <!-- Viewport and Mobile Settings -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover" />
    
    <!-- PWA Theme Colors -->
    <meta name="theme-color" content="#0284c7" />
    <meta name="msapplication-TileColor" content="#0284c7" />
    
    <!-- PWA Mobile Web App Settings -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="STA Inventory" />
    
    <!-- App Description and Metadata -->
    <meta
      name="description"
      content="Street Thrift Apparel (STA) - Professional inventory management system for thrift shops with real-time tracking, offline support, and advanced analytics"
    />
    <meta name="keywords" content="inventory, management, thrift shop, stock tracking, POS" />
    <meta name="author" content="Thrift Shop Development Team" />
    
    <!-- Additional PWA Support -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="format-detection" content="email=no" />
    
    <!-- Windows Tile Settings -->
    <meta name="msapplication-config" content="none" />
    
    <!-- Open Graph Tags for Sharing -->
    <meta property="og:title" content="STA - Street Thrift Apparel Inventory" />
    <meta property="og:description" content="Professional inventory management system" />
    <meta property="og:image" content="%PUBLIC_URL%/logo512.png" />
    <meta property="og:type" content="website" />
    
    <title>STA - Street Thrift Apparel Inventory</title>
  </head>
  <body>
    <noscript>
      <div style="
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #f5f5f5;
        padding: 20px;
      ">
        <div style="text-align: center; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
          <h1 style="margin: 0 0 20px 0; color: #0284c7;">You need to enable JavaScript</h1>
          <p style="margin: 0; color: #666;">Please enable JavaScript to run the STA Inventory Management System.</p>
        </div>
      </div>
    </noscript>
    <div id="root"></div>
    
    <!-- PWA Install Prompt Helper -->
    <script>
      // Do NOT call e.preventDefault() here: that suppresses the browser's
      // native install prompt. Keep a reference only for optional custom UI.
      window.addEventListener('beforeinstallprompt', (e) => {
        window.deferredPrompt = e;
        console.log('📱 App ready to install');
      });

      window.addEventListener('appinstalled', () => {
        console.log('✅ App installed successfully');
        window.deferredPrompt = null;
      });
    </script>
  </body>
</html>
